<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dcfff"/>
      <stop offset="100%" stop-color="#2ac3de"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#7dcfff" stroke-width="12"/>

  <!-- Central snowflake / star core -->
  <g fill="url(#cyan)">
    <polygon points="256,100 270,230 400,230 290,290 330,420 256,330 182,420 222,290 112,230 242,230"/>
  </g>

  <!-- Audio waveform inside the snowflake -->
  <g stroke="#1a1b26" stroke-width="14" stroke-linecap="round" fill="none">
    <path d="M 196 256 L 196 216"/>
    <path d="M 226 256 L 226 196"/>
    <path d="M 256 256 L 256 186"/>
    <path d="M 286 256 L 286 196"/>
    <path d="M 316 256 L 316 216"/>
  </g>

  <!-- Outer decorative snowflake arms (subtle) -->
  <g stroke="#7dcfff" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.3">
    <path d="M 256 40 L 256 80"/>
    <path d="M 256 432 L 256 472"/>
    <path d="M 40 256 L 80 256"/>
    <path d="M 432 256 L 472 256"/>
    <path d="M 110 110 L 138 138"/>
    <path d="M 374 374 L 402 402"/>
    <path d="M 402 110 L 374 138"/>
    <path d="M 138 374 L 110 402"/>
  </g>
</svg>
