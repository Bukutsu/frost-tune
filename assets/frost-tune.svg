<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <!-- Smooth Tokyo Night background gradient -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#24283b" />
            <stop offset="100%" stop-color="#15161e" />
        </linearGradient>

        <!-- Accent Blue -->
        <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7dcfff" />
            <stop offset="100%" stop-color="#0db9d7" />
        </linearGradient>
    </defs>

    <!-- App Icon Base Surface -->
    <rect width="512" height="512" rx="115" fill="url(#bgGradient)" />

    <!-- Top Motif: Clean Parametric EQ Soundwave -->
    <path d="M 116 200 
             C 146 200, 156 150, 176 150 
             C 196 150, 206 240, 226 240 
             C 240 240, 246 100, 256 100 
             C 266 100, 272 260, 286 260 
             C 306 260, 316 160, 336 160 
             C 356 160, 366 200, 396 200" 
          fill="none" stroke="url(#accentBlue)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Bottom Motif: Detailed Front-Facing DAC Unit -->
    <g transform="translate(0, 20)">
        
        <!-- Main Chassis Plate -->
        <rect x="116" y="290" width="280" height="64" rx="8" fill="url(#accentBlue)" />

        <!-- Chassis Mounting Screws (Corners) -->
        <circle cx="128" cy="302" r="3.5" fill="#15161e" />
        <circle cx="128" cy="342" r="3.5" fill="#15161e" />
        <circle cx="384" cy="302" r="3.5" fill="#15161e" />
        <circle cx="384" cy="342" r="3.5" fill="#15161e" />

        <!-- 1/4" Headphone Jack Output -->
        <circle cx="160" cy="322" r="14" fill="none" stroke="#15161e" stroke-width="4" />
        <circle cx="160" cy="322" r="6" fill="#15161e" />

        <!-- Toggle Button / Status LED -->
        <circle cx="200" cy="322" r="6" fill="none" stroke="#15161e" stroke-width="3" />

        <!-- Center Vents / Heatsink Grille -->
        <line x1="220" y1="304" x2="280" y2="304" stroke="#15161e" stroke-width="4" stroke-linecap="round" />
        <line x1="220" y1="316" x2="280" y2="316" stroke="#15161e" stroke-width="4" stroke-linecap="round" />
        <line x1="220" y1="328" x2="280" y2="328" stroke="#15161e" stroke-width="4" stroke-linecap="round" />
        <line x1="220" y1="340" x2="280" y2="340" stroke="#15161e" stroke-width="4" stroke-linecap="round" />

        <!-- Large Tactile Volume Knob (Overlaps the chassis and vents) -->
        <circle cx="316" cy="322" r="28" fill="#7dcfff" stroke="#15161e" stroke-width="4" />
        <!-- Knob Position Indicator -->
        <line x1="316" y1="322" x2="302" y2="342" stroke="#15161e" stroke-width="4" stroke-linecap="round" />

        <!-- USB-C / Data Input Slot -->
        <rect x="360" y="318" width="16" height="8" rx="3" fill="#15161e" />
        
    </g>
</svg>
