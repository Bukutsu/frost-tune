name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release-artifacts:
    name: Build Release (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: frost-tune
            deps: libudev-dev pkg-config
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: frost-tune.exe
            deps: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Enable sccache (best effort)
        shell: bash
        run: |
          export RUSTC_WRAPPER=sccache
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          sccache --stop-server || true
          if ! sccache --start-server; then
            echo "sccache backend unavailable, falling back to direct rustc"
            export RUSTC_WRAPPER=
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Derive release metadata
        shell: bash
        run: |
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune-rust-v1"
          key: "${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}"
          cache-on-failure: true
          cache-directories: |
            ~/.cache/sccache
            ~/AppData/Local/Mozilla/sccache/cache

      - name: Sync Cargo.toml version from tag
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import re
          import os
          import sys

          version = os.environ["RELEASE_VERSION"]
          cargo_toml = pathlib.Path("Cargo.toml")
          content = cargo_toml.read_text(encoding="utf-8")

          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', content)
          if not match:
              print("WARNING: Could not find version in Cargo.toml")
              sys.exit(0)

          current_version = match.group(1)
          if current_version == version:
              print(f"Cargo.toml already at version {version}, skipping update")
              sys.exit(0)

          updated = re.sub(
              r'(?m)^version\s*=\s*"[^"]+"\s*$',
              f'version = "{version}"',
              content,
              count=1,
          )
          cargo_toml.write_text(updated, encoding="utf-8")
          print(f"Updated Cargo.toml version from {current_version} to {version}")
          PY

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Build release (fallback if sccache fails)
        shell: bash
        run: |
          if ! cargo build --release --target ${{ matrix.target }}; then
            echo "Release build failed, retrying without sccache"
            RUSTC_WRAPPER= cargo build --release --target ${{ matrix.target }}
          fi

      - name: sccache stats
        run: sccache --show-stats || true

      - name: Build Debian package
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cargo install cargo-deb
          cargo deb
          cp "target/debian/frost-tune_${RELEASE_VERSION}-1_amd64.deb" "frost-tune-${RELEASE_TAG}-amd64.deb"

      - name: Build RPM package
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cargo install cargo-generate-rpm
          cargo generate-rpm
          cp "target/generate-rpm/frost-tune-${RELEASE_VERSION}-1.x86_64.rpm" "frost-tune-${RELEASE_TAG}-x86_64.rpm"

      - name: Prepare versioned binary filename
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ASSET_NAME="frost-tune-${RELEASE_TAG}-${{ matrix.target }}.exe"
          else
            ASSET_NAME="frost-tune-${RELEASE_TAG}-${{ matrix.target }}"
          fi
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}
          retention-days: 14

      - name: Upload Debian package
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: frost-tune-${{ env.RELEASE_TAG }}-amd64.deb
          path: frost-tune-${{ env.RELEASE_TAG }}-amd64.deb
          retention-days: 14

      - name: Upload RPM package
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: frost-tune-${{ env.RELEASE_TAG }}-x86_64.rpm
          path: frost-tune-${{ env.RELEASE_TAG }}-x86_64.rpm
          retention-days: 14

  publish-github-release:
    name: Publish GitHub Release
    needs: build-release-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: frost-tune-*
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
