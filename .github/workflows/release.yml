name: Release

on:
  push:
    tags: ['v*.*.*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: frost-tune-x86_64-unknown-linux-gnu
            package: tar czf
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: frost-tune_x86_64_pc_windows
            package: powershell -Command "Compress-Archive"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libhidapi-dev libudev-dev pkg-config

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: ${{ matrix.package }} ${{ matrix.artifact_name }}.tar.gz -C target/${{ matrix.target }}/release frost-tune

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: ${{ matrix.package }} -Path target\${{ matrix.target }}\release\frost-tune.exe -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
          generate_release_notes: true