name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release-artifacts:
    name: Build Release (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: frost-tune
            artifact: frost-tune-x86_64-unknown-linux-gnu.tar.gz
            deps: libusb-1.0-0-dev pkg-config
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: frost-tune.exe
            artifact: frost-tune-x86_64-pc-windows-msvc.zip
            deps: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune-release"
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify tests
        run: cargo test --locked --target ${{ matrix.target }} -- --nocapture

      - name: Package Linux artifact
        if: matrix.os == 'ubuntu-latest'
        run: tar czf ${{ matrix.artifact }} -C target/${{ matrix.target }}/release ${{ matrix.binary }}

      - name: Package Windows artifact
        if: matrix.os == 'windows-latest'
        run: powershell -Command "Compress-Archive -Path target\${{ matrix.target }}\release\${{ matrix.binary }} -DestinationPath ${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 14

  publish-github-release:
    name: Publish GitHub Release
    needs: build-release-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: frost-tune-x86_64-unknown-linux-gnu.tar.gz
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: frost-tune-x86_64-pc-windows-msvc.zip
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/frost-tune-x86_64-unknown-linux-gnu.tar.gz
            artifacts/frost-tune-x86_64-pc-windows-msvc.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
