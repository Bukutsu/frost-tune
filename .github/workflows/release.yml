name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  sync-versions:
    name: Sync Versions from Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Sync version files from tag
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import os

          version = os.environ["RELEASE_VERSION"]
          changed = False

          # Cargo.toml
          cargo_toml = pathlib.Path("Cargo.toml")
          content = cargo_toml.read_text(encoding="utf-8")
          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', content)
          if match and match.group(1) != version:
              updated = re.sub(r'(?m)^version\s*=\s*"[^"]+"\s*$', f'version = "{version}"', content, count=1)
              cargo_toml.write_text(updated, encoding="utf-8")
              print(f"Updated Cargo.toml: {match.group(1)} -> {version}")
              changed = True

          # PKGBUILD
          pkgbuild = pathlib.Path("PKGBUILD")
          if pkgbuild.exists():
              content = pkgbuild.read_text(encoding="utf-8")
              match = re.search(r'(?m)^pkgver=([\d.]+)\s*$', content)
              if match and match.group(1) != version:
                  updated = re.sub(r'(?m)^pkgver=[\d.]+\s*$', f'pkgver={version}', content, count=1)
                  pkgbuild.write_text(updated, encoding="utf-8")
                  print(f"Updated PKGBUILD: {match.group(1)} -> {version}")
                  changed = True

          if changed:
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("VERSIONS_CHANGED=1\n")
          PY

      - name: Commit version bumps
        if: env.VERSIONS_CHANGED == '1'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml PKGBUILD 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "chore(release): bump version to ${{ env.RELEASE_VERSION }}"
            git push origin HEAD:main
          }

  build-release:
    name: Build Release (${{ matrix.target }})
    needs: sync-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: frost-tune
            deps: libudev-dev pkg-config
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: frost-tune.exe
            deps: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.7

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune-v1"
          cache-directories: |
            ~/.cache/sccache
            ~/AppData/Local/Mozilla/sccache/cache

      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install cargo-wix
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: cargo install cargo-wix --locked --version "^0.3"

      - name: Build MSI installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cargo wix --no-build --nocapture `
            --target ${{ matrix.target }} `
            --output "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-x86_64.msi"

      - name: Build Debian package
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          PKG_ROOT="$(mktemp -d)"
          mkdir -p "$PKG_ROOT/DEBIAN"
          mkdir -p "$PKG_ROOT/usr/bin"
          mkdir -p "$PKG_ROOT/usr/share/applications"
          mkdir -p "$PKG_ROOT/usr/share/icons/hicolor/scalable/apps"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$PKG_ROOT/usr/bin/"
          cp assets/frost-tune.desktop "$PKG_ROOT/usr/share/applications/"
          cp assets/frost-tune.svg "$PKG_ROOT/usr/share/icons/hicolor/scalable/apps/"
          cat > "$PKG_ROOT/DEBIAN/control" << EOF
          Package: frost-tune
          Version: ${{ needs.sync-versions.outputs.release_version }}
          Architecture: amd64
          Maintainer: Bukutsu
          Depends: polkit
          Section: sound
          Priority: optional
          Homepage: https://github.com/Bukutsu/frost-tune
          Description: Native parametric EQ editor for USB DACs
           A graphical parametric EQ editor for USB DACs with hardware
           HID communication, 10-band EQ, and AutoEQ profile support.
          EOF
          dpkg-deb --build "$PKG_ROOT" \
            "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-amd64.deb" >/dev/null

      - name: Build RPM package
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rpm
          RPM_ROOT="$(mktemp -d)"
          mkdir -p "$RPM_ROOT/SOURCES" "$RPM_ROOT/SPECS" "$RPM_ROOT/BUILD" "$RPM_ROOT/RPMS/x86_64"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$RPM_ROOT/SOURCES/"
          cat > "$RPM_ROOT/SPECS/frost-tune.spec" << EOF
          Name: frost-tune
          Version: ${{ needs.sync-versions.outputs.release_version }}
          Release: 1
          Summary: Native parametric EQ editor for USB DACs
          License: MIT
          URL: https://github.com/Bukutsu/frost-tune
          BuildArch: x86_64
          Requires: polkit
          AutoReqProv: no
          %description
          A graphical parametric EQ editor for USB DACs with hardware
          HID communication, 10-band EQ, and AutoEQ profile support.
          %install
          mkdir -p %{buildroot}%{_bindir}
          cp %{_sourcedir}/frost-tune %{buildroot}%{_bindir}/
          %files
          %{_bindir}/frost-tune
          EOF
          rpmbuild -bb --define "_topdir $RPM_ROOT" "$RPM_ROOT/SPECS/frost-tune.spec"
          cp "$RPM_ROOT/RPMS/x86_64/frost-tune-${{ needs.sync-versions.outputs.release_version }}-1.x86_64.rpm" \
             "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-x86_64.rpm"

      - name: Copy binary
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.sync-versions.outputs.release_tag }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "frost-tune-${RELEASE_TAG}-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "frost-tune-${RELEASE_TAG}-${{ matrix.target }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: frost-tune-*
          retention-days: 7

  publish-release:
    name: Publish Release
    needs: [sync-versions, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: find artifacts -type f -exec mv {} . \; -o -type d -delete

      - uses: softprops/action-gh-release@v2
        with:
          files: frost-tune-*
          generate_release_notes: true
