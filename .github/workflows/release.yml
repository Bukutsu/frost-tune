name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  sync-versions:
    name: Sync Versions from Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"



  build-release:
    name: Build Release (${{ matrix.target }})
    needs: sync-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: frost-tune
            deps: libudev-dev pkg-config
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: frost-tune.exe
            deps: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.7

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune-v1"
          cache-directories: |
            ~/.cache/sccache
            ~/AppData/Local/Mozilla/sccache/cache

      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install cargo-wix
        if: matrix.os == 'windows-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-wix@0.3

      - name: Build MSI installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cargo wix --no-build --nocapture `
            --target ${{ matrix.target }} `
            --output "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-x86_64.msi"

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build Debian package
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo deb --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-amd64.deb"

      - name: Build RPM package
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo generate-rpm --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/generate-rpm/*.rpm "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-x86_64.rpm"

      - name: Copy binary
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.sync-versions.outputs.release_tag }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "frost-tune-${RELEASE_TAG}-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "frost-tune-${RELEASE_TAG}-${{ matrix.target }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: frost-tune-*
          retention-days: 7

  publish-release:
    name: Publish Release
    needs: [sync-versions, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          find artifacts -type f -exec cp {} . \;
          ls -la frost-tune-*

      - uses: softprops/action-gh-release@v2
        with:
          files: frost-tune-*
          generate_release_notes: true

