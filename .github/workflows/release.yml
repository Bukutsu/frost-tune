name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  sync-versions:
    name: Sync Versions from Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Sync version files from tag
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import os
          import urllib.request
          import hashlib

          version = os.environ["RELEASE_VERSION"]
          changed = False

          # 1. Cargo.toml
          cargo_toml = pathlib.Path("Cargo.toml")
          content = cargo_toml.read_text(encoding="utf-8")
          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', content)
          if match and match.group(1) != version:
              updated = re.sub(r'(?m)^version\s*=\s*"[^"]+"\s*$', f'version = "{version}"', content, count=1)
              cargo_toml.write_text(updated, encoding="utf-8")
              print(f"Updated Cargo.toml: {match.group(1)} -> {version}")
              changed = True

          # 2. Root PKGBUILD wrapper
          pkgbuild = pathlib.Path("PKGBUILD")
          if pkgbuild.exists():
              content = pkgbuild.read_text(encoding="utf-8")
              match = re.search(r'(?m)^pkgver=([\d.]+)\s*$', content)
              if match and match.group(1) != version:
                  content = re.sub(r'(?m)^pkgver=[\d.]+$', f'pkgver={version}', content, count=1)
                  content = re.sub(r'(?m)^pkgrel=\d+$', 'pkgrel=1', content, count=1)
                  pkgbuild.write_text(content, encoding="utf-8")
                  print(f"Updated root PKGBUILD")
                  changed = True

          # 3. Download source tarball and compute SHA256
          tarball_url = f"https://github.com/Bukutsu/frost-tune/archive/refs/tags/v{version}.tar.gz"
          print(f"Downloading source tarball from: {tarball_url}")
          sha256_hash = None
          try:
              req = urllib.request.Request(
                  tarball_url,
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req) as response:
                  tarball_data = response.read()
              sha256_hash = hashlib.sha256(tarball_data).hexdigest()
              print(f"Computed source tarball SHA256: {sha256_hash}")
          except Exception as e:
              print(f"Failed to fetch or hash source tarball: {e}")

          # 4. Source PKGBUILD
          pkgbuild_src = pathlib.Path("packaging/arch/PKGBUILD")
          if pkgbuild_src.exists():
              content = pkgbuild_src.read_text(encoding="utf-8")
              content = re.sub(r'(?m)^pkgver=[\d.]+$', f'pkgver={version}', content, count=1)
              content = re.sub(r'(?m)^pkgrel=\d+$', 'pkgrel=1', content, count=1)
              if sha256_hash:
                  content = re.sub(r'(?m)^sha256sums=\([^)]*\)', f"sha256sums=('{sha256_hash}')", content, count=1)
              pkgbuild_src.write_text(content, encoding="utf-8")
              print(f"Updated packaging/arch/PKGBUILD")
              changed = True

          # 5. Binary PKGBUILD
          pkgbuild_bin = pathlib.Path("packaging/arch-bin/PKGBUILD")
          if pkgbuild_bin.exists():
              content = pkgbuild_bin.read_text(encoding="utf-8")
              content = re.sub(r'(?m)^pkgver=[\d.]+$', f'pkgver={version}', content, count=1)
              content = re.sub(r'(?m)^pkgrel=\d+$', 'pkgrel=1', content, count=1)
              pkgbuild_bin.write_text(content, encoding="utf-8")
              print(f"Updated packaging/arch-bin/PKGBUILD")
              changed = True

          if changed:
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("VERSIONS_CHANGED=1\n")
          PY

      - name: Commit version bumps
        if: env.VERSIONS_CHANGED == '1'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml PKGBUILD packaging/arch/PKGBUILD packaging/arch-bin/PKGBUILD 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "chore(release): bump version to ${{ env.RELEASE_VERSION }}"
            git push origin HEAD:main
          }

  build-release:
    name: Build Release (${{ matrix.target }})
    needs: sync-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: frost-tune
            deps: libudev-dev pkg-config
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: frost-tune.exe
            deps: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.7

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune-v1"
          cache-directories: |
            ~/.cache/sccache
            ~/AppData/Local/Mozilla/sccache/cache

      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install cargo-wix
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: cargo install cargo-wix --locked --version "^0.3"

      - name: Build MSI installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cargo wix --no-build --nocapture `
            --target ${{ matrix.target }} `
            --output "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-x86_64.msi"

      - name: Build Debian package
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-deb --locked
          cargo deb --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-amd64.deb"

      - name: Build RPM package
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-generate-rpm --locked
          cargo generate-rpm --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/generate-rpm/*.rpm "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-x86_64.rpm"

      - name: Copy binary
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.sync-versions.outputs.release_tag }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "frost-tune-${RELEASE_TAG}-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "frost-tune-${RELEASE_TAG}-${{ matrix.target }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: frost-tune-*
          retention-days: 7

  publish-release:
    name: Publish Release
    needs: [sync-versions, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          find artifacts -type f -exec cp {} . \;
          ls -la frost-tune-*

      - name: Update binary PKGBUILD checksums
        env:
          RELEASE_VERSION: ${{ needs.sync-versions.outputs.release_version }}
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import hashlib
          import re
          import os

          version = os.environ["RELEASE_VERSION"]
          print(f"Bumping PKGBUILD checksums for version: {version}")

          binary_file = pathlib.Path(f"frost-tune-v{version}-x86_64-unknown-linux-gnu")
          desktop_file = pathlib.Path("assets/frost-tune.desktop")
          svg_file = pathlib.Path("assets/frost-tune.svg")

          if not binary_file.exists():
              print(f"Warning: Linux binary not found at standard path: {binary_file}")
              for f in pathlib.Path(".").glob("frost-tune-*x86_64-unknown-linux-gnu*"):
                  if not f.name.endswith(".deb") and not f.name.endswith(".rpm"):
                      binary_file = f
                      print(f"Found fallback Linux binary: {binary_file}")
                      break

          def get_sha256(path):
              if not path.exists():
                  raise FileNotFoundError(f"Required packaging file not found: {path}")
              return hashlib.sha256(path.read_bytes()).hexdigest()

          try:
              hash1 = get_sha256(binary_file)
              hash2 = get_sha256(desktop_file)
              hash3 = get_sha256(svg_file)
              print(f"Hashes computed:\n  Binary: {hash1}\n  Desktop: {hash2}\n  SVG: {hash3}")

              pkgbuild_bin = pathlib.Path("packaging/arch-bin/PKGBUILD")
              if pkgbuild_bin.exists():
                  content = pkgbuild_bin.read_text(encoding="utf-8")
                  content = re.sub(
                      r'(?m)^sha256sums=\([^)]*\)',
                      f"sha256sums=(\n    '{hash1}'\n    '{hash2}'\n    '{hash3}'\n)",
                      content,
                      count=1
                  )
                  pkgbuild_bin.write_text(content, encoding="utf-8")
                  print("Updated packaging/arch-bin/PKGBUILD with calculated checksums")
              else:
                  print("Error: packaging/arch-bin/PKGBUILD not found!")
          except Exception as e:
              print(f"Error computing hashes or updating PKGBUILD: {e}")
              exit(1)
          PY

      - name: Generate AUR .SRCINFO in Docker
        run: |
          docker run --rm -v "$PWD:/workspace" -w /workspace archlinux:latest bash -c "
            useradd -m builder &&
            chown -R builder:builder /workspace &&
            su builder -c 'cd packaging/arch && makepkg --printsrcinfo > .SRCINFO' &&
            su builder -c 'cd packaging/arch-bin && makepkg --printsrcinfo > .SRCINFO'
          "

      - name: Commit and push AUR updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/arch/PKGBUILD packaging/arch/.SRCINFO packaging/arch-bin/PKGBUILD packaging/arch-bin/.SRCINFO
          git diff --cached --quiet || {
            git commit -m "chore(release): update AUR package definitions and checksums for v${{ needs.sync-versions.outputs.release_version }}"
            git push origin HEAD:main
          }

      - uses: softprops/action-gh-release@v2
        with:
          files: frost-tune-*
          generate_release_notes: true

