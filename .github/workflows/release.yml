name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3

jobs:
  sync-versions:
    name: Sync Versions from Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Sync all version files from tag
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import os

          version = os.environ["RELEASE_VERSION"]
          changed = False

          # 1. Cargo.toml
          cargo_toml = pathlib.Path("Cargo.toml")
          content = cargo_toml.read_text(encoding="utf-8")
          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', content)
          if match and match.group(1) != version:
              updated = re.sub(
                  r'(?m)^version\s*=\s*"[^"]+"\s*$',
                  f'version = "{version}"',
                  content,
                  count=1,
              )
              cargo_toml.write_text(updated, encoding="utf-8")
              print(f"Updated Cargo.toml: {match.group(1)} -> {version}")
              changed = True
          else:
              print(f"Cargo.toml already at {version}")

          # 2. Source PKGBUILD
          pkgbuild = pathlib.Path("packaging/arch/PKGBUILD")
          content = pkgbuild.read_text(encoding="utf-8")
          match = re.search(r'(?m)^pkgver=([\d.]+)\s*$', content)
          if match and match.group(1) != version:
              updated = re.sub(
                  r'(?m)^pkgver=[\d.]+\s*$',
                  f'pkgver={version}',
                  content,
                  count=1,
              )
              pkgbuild.write_text(updated, encoding="utf-8")
              print(f"Updated packaging/arch/PKGBUILD: {match.group(1)} -> {version}")
              changed = True
          else:
              print(f"packaging/arch/PKGBUILD already at {version}")

          # 3. Binary PKGBUILD — version + sha256sums to SKIP
          bin_pkgbuild = pathlib.Path("packaging/arch-bin/PKGBUILD")
          if bin_pkgbuild.exists():
              content = bin_pkgbuild.read_text(encoding="utf-8")
              match = re.search(r'(?m)^pkgver=([\d.]+)\s*$', content)
              if match and match.group(1) != version:
                  updated = re.sub(
                      r'(?m)^pkgver=[\d.]+\s*$',
                      f'pkgver={version}',
                      content,
                      count=1,
                  )
                  # Also reset sha256sums to SKIP since we can't know them yet
                  updated = re.sub(
                      r"sha256sums=\([^)]*\)",
                      "sha256sums=('SKIP' 'SKIP' 'SKIP')",
                      updated,
                  )
                  bin_pkgbuild.write_text(updated, encoding="utf-8")
                  print(f"Updated packaging/arch-bin/PKGBUILD: {match.group(1)} -> {version}")
                  changed = True
              else:
                  print(f"packaging/arch-bin/PKGBUILD already at {version}")

          if changed:
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("VERSIONS_CHANGED=1\n")
          PY

      - name: Commit version bumps back to main
        if: env.VERSIONS_CHANGED == '1'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml packaging/arch/PKGBUILD packaging/arch-bin/PKGBUILD Cargo.lock 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "chore(release): bump version to ${{ env.RELEASE_VERSION }}"
            git push origin HEAD:main
          }

  build-release-artifacts:
    name: Build Release (${{ matrix.target }})
    needs: sync-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: frost-tune
            deps: libudev-dev pkg-config
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: frost-tune.exe
            deps: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune-v1"
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          cache-all-crates: true
          cache-directories: |
            ~/.cache/sccache
            ~/AppData/Local/Mozilla/sccache/cache

      - name: Enable sccache
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Cache cargo packaging tools
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-deb
            ~/.cargo/bin/cargo-generate-rpm
          key: ${{ runner.os }}-cargo-tools-v2

      - name: Build Debian package
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          if ! command -v cargo-deb &> /dev/null; then
            cargo install cargo-deb@3.7.0
          fi
          cargo deb
          cp "target/debian/frost-tune_${{ needs.sync-versions.outputs.release_version }}-1_amd64.deb" \
             "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-amd64.deb"

      - name: Build RPM package
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          if ! command -v cargo-generate-rpm &> /dev/null; then
            cargo install cargo-generate-rpm@0.21.0
          fi
          cargo generate-rpm
          cp "target/generate-rpm/frost-tune-${{ needs.sync-versions.outputs.release_version }}-1.x86_64.rpm" \
             "frost-tune-${{ needs.sync-versions.outputs.release_tag }}-x86_64.rpm"

      - name: Prepare versioned binary filename
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.sync-versions.outputs.release_tag }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ASSET_NAME="frost-tune-${RELEASE_TAG}-${{ matrix.target }}.exe"
          else
            ASSET_NAME="frost-tune-${RELEASE_TAG}-${{ matrix.target }}"
          fi
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}
          retention-days: 7

      - name: Upload Debian package
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: frost-tune-${{ needs.sync-versions.outputs.release_tag }}-amd64.deb
          path: frost-tune-${{ needs.sync-versions.outputs.release_tag }}-amd64.deb
          retention-days: 7

      - name: Upload RPM package
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: frost-tune-${{ needs.sync-versions.outputs.release_tag }}-x86_64.rpm
          path: frost-tune-${{ needs.sync-versions.outputs.release_tag }}-x86_64.rpm
          retention-days: 7

  publish-github-release:
    name: Publish GitHub Release
    needs: [sync-versions, build-release-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: frost-tune-*
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
