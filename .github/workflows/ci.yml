name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (quick-check)
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev pkg-config

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune"
          cache-on-failure: true

      - name: Check (fail-fast)
        run: cargo check --all-targets

  build:
    name: Build (${{ matrix.target }})
    needs: quick-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            deps: libhidapi-dev libusb-1.0-0-dev pkg-config
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            deps: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune"
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked -- --nocapture

      - name: Package Linux artifact
        if: matrix.os == 'ubuntu-latest'
        run: tar czf frost-tune-x86_64-unknown-linux-gnu.tar.gz -C target/${{ matrix.target }}/release frost-tune

      - name: Package Windows artifact
        if: matrix.os == 'windows-latest'
        run: powershell -Command "Compress-Archive -Path target\${{ matrix.target }}\release\frost-tune.exe -DestinationPath frost-tune_x86_64_pc_windows.zip"

      - name: Upload artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: frost-tune-x86_64-unknown-linux-gnu
          path: |
            frost-tune-x86_64-unknown-linux-gnu.tar.gz
          retention-days: 14

      - name: Upload artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: frost-tune_x86_64_pc_windows
          path: frost-tune_x86_64_pc_windows.zip
          retention-days: 14
