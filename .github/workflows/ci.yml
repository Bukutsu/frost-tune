name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Enable sccache (best effort)
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          if ! sccache --start-server; then
            echo "sccache backend unavailable, falling back to direct rustc"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"
          fi

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune-rust-v1"
          key: "${{ runner.os }}-x86_64-unknown-linux-gnu-check"
          cache-on-failure: true
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Build check (fallback if sccache fails)
        shell: bash
        run: |
          if ! cargo check --lib; then
            echo "Build check failed, retrying without sccache"
            RUSTC_WRAPPER= SCCACHE_GHA_ENABLED= cargo check --lib
          fi

      - name: sccache stats
        run: sccache --show-stats || true
