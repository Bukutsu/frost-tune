name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune"

      - name: Check (fail-fast)
        run: cargo check --all-targets

  build:
    name: Build (${{ matrix.target }})
    needs: quick-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            deps: libhidapi-dev
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            deps: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }} libudev-dev

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked -- --nocapture

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frost-tune-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/frost-tune.exe
            target/${{ matrix.target }}/release/frost-tune
          retention-days: 1