name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    name: Lint and Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libhidapi-dev pkg-config

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "frost-tune"
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --check

      - name: Type check
        run: cargo check --all-targets

      - name: Run tests
        run: cargo test --locked -- --nocapture
